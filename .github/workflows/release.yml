name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o bp_cli-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/bp/

      - uses: actions/upload-artifact@v4
        with:
          name: bp_cli-${{ matrix.os }}-${{ matrix.arch }}
          path: bp_cli-*

  extension:
    name: Build Extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: bash scripts/build-extensions.sh

      - name: Package
        run: |
          cd dist
          tar czf ../browse-pilot-extension-firefox.tar.gz firefox/
          tar czf ../browse-pilot-extension-chrome.tar.gz chrome/
          tar czf ../browse-pilot-extension-edge.tar.gz edge/

      - uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: browse-pilot-extension-*.tar.gz

  release:
    name: Create Release
    needs: [build, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bp_cli-*
            browse-pilot-extension-*.tar.gz
